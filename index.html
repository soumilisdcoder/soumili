<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" id="form">
    <h1>DATA ENTRY</h1></BR></BR>
    <input type="text" placeholder="enter name" id="i1"><br><br>
    <input type="email" placeholder="enter email" id="i2"><br><br>
    <input type="number" placeholder="enter number" id="i3"><br><br>
    <button type="submit">submit</button><br><br>
    </form><br>
    <table  border="1" cellpadding="9" cellspacing="2">
        <thead>
            <tr>
                <th>ID</th>
                <th>NAME</th>
                <th>EMAIL</th>
                <th>AGE</th>
                <th>delete</th>
            </tr>
        </thead>
        <tbody id="tbody">

        </tbody>
    </table>

</html>
<script src="a.js"></script>
<style>
    /* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* Body Styling */
body {
    background: linear-gradient(135deg, #4e73df, #1cc88a);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px;
}

/* Form Styling */
form {
    background: white;
    padding: 25px 35px;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    width: 350px;
    text-align: center;
    margin-bottom: 30px;
}

form h1 {
    margin-bottom: 20px;
    color: #333;
}

/* Input Styling */
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 5px;
    transition: 0.3s;
}

input:focus {
    border-color: #4e73df;
    outline: none;
    box-shadow: 0 0 5px rgba(78, 115, 223, 0.5);
}

/* Button Styling */
button {
    width: 100%;
    padding: 10px;
    background: #4e73df;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    background: #2e59d9;
}

/* Table Styling */
table {
    background: white;
    border-collapse: collapse;
    width: 80%;
    max-width: 800px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    border-radius: 8px;
    overflow: hidden;
}

thead {
    background: #4e73df;
    color: white;
}

th, td {
    padding: 12px;
    text-align: center;
}

tbody tr:nth-child(even) {
    background-color: #f2f2f2;
}

tbody tr:hover {
    background-color: #d1ecf1;
    transition: 0.3s;
}

/* Delete Button (if you add one inside table) */
.delete-btn {
    background: #e74a3b;
    padding: 5px 10px;
    border-radius: 4px;
    color: white;
    border: none;
    cursor: pointer;
}

.delete-btn:hover {
    background: #c0392b;
}
</style>
